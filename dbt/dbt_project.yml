name: safeguards_rag
version: "1.0.0"
config-version: 2

profile: safeguards_rag

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - target
  - dbt_packages

models:
  safeguards_rag:
    staging:
      +schema: staging
      +materialized: view
    intermediate:
      +schema: intermediate
      +materialized: view
    marts:
      +schema: marts
      facts:
        +materialized: incremental
        +incremental_strategy: merge
        +unique_key: signal_id
      dimensions:
        +materialized: table
